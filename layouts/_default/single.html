<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>{{ .Title }} — {{ .Site.Title }}</title>
</head>
<body>
  <main style="max-width: 700px; margin: 40px auto; padding: 0 16px; font-family: serif;">
    <a href="/" style="font-size: 14px;">← Volver</a>
    <h1 style="margin-top: 24px;">{{ .Title }}</h1>
    <div style="opacity:.6; font-size: 14px; margin-bottom: 32px;">{{ .Date.Format "2006-01-02" }}</div>
    <div>{{ .Content }}</div>
  </main>
</body>
</html>
